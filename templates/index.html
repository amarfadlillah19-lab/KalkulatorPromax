<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KalkulatorPromax</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="title-left">
            <span class="title-icon">◈</span>
            <span class="title-text">KalkulatorPromax</span>
        </div>
        <div class="menu-bar">
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Help</span>
        </div>
        <div class="title-right">
            <button id="themeToggle" class="window-btn" title="Toggle Dark/Light">◐</button>
            <button class="window-btn minimize">−</button>
            <button class="window-btn maximize">□</button>
            <button class="window-btn close">×</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="row g-3 h-100">
            <!-- Left Panel -->
            <div class="col-lg-7 col-md-12">
                <div class="app-window">
                    <div class="window-header">
                        <div class="window-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <span class="window-title" id="windowTitle">Arithmetic.exe</span>
                    </div>

                    <div class="window-body">
                        <!-- Tabs -->
                        <div class="tab-container">
                            <button class="tab-btn active" data-cat="aritmatika">Aritmatika</button>
                            <button class="tab-btn" data-cat="logika">Logika</button>
                            <button class="tab-btn" data-cat="basis">Basis</button>
                            <button class="tab-btn" data-cat="suhu">Suhu</button>
                            <button class="tab-btn" data-cat="kurs">Kurs</button>
                            <button class="tab-btn" data-cat="bonus">Bonus</button>
                        </div>

                        <!-- Content Area -->
                        <div class="content-area">
                            <!-- Inputs -->
                            <div class="input-section" id="inputSection">
                                <div class="row g-2" id="dualInput">
                                    <div class="col-6">
                                        <label class="input-label">Variable A:</label>
                                        <input type="text" id="inputA" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                    <div class="col-6">
                                        <label class="input-label">Variable B:</label>
                                        <input type="text" id="inputB" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                </div>
                                <div class="row g-2 d-none" id="singleInput">
                                    <div class="col-12">
                                        <label class="input-label">Input Value:</label>
                                        <input type="text" id="inputSingle" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                </div>
                            </div>

                            <!-- Operation Buttons -->
                            <div class="ops-section" id="opsSection">
                                <!-- Aritmatika -->
                                <div class="ops-grid active" data-cat="aritmatika">
                                    <button class="op-btn" data-op="+">+</button>
                                    <button class="op-btn" data-op="-">−</button>
                                    <button class="op-btn" data-op="*">×</button>
                                    <button class="op-btn" data-op="/">÷</button>
                                    <button class="op-btn" data-op="%">%</button>
                                    <button class="op-btn" data-op="^">^</button>
                                    <button class="op-btn" data-op="mod">mod</button>
                                    <button class="op-btn" data-op="floor">//</button>
                                    <button class="op-btn wide" data-op="sqrt">√ AKAR</button>
                                </div>

                                <!-- Logika -->
                                <div class="ops-grid" data-cat="logika">
                                    <button class="op-btn" data-op="AND">AND</button>
                                    <button class="op-btn" data-op="OR">OR</button>
                                    <button class="op-btn" data-op="XOR">XOR</button>
                                    <button class="op-btn" data-op="NOT">NOT</button>
                                    <button class="op-btn" data-op="NAND">NAND</button>
                                    <button class="op-btn" data-op="NOR">NOR</button>
                                </div>

                                <!-- Basis -->
                                <div class="ops-grid basis-grid" data-cat="basis">
                                    <button class="op-btn" data-op="dec-to-bin">DEC→BIN</button>
                                    <button class="op-btn" data-op="dec-to-oct">DEC→OCT</button>
                                    <button class="op-btn" data-op="dec-to-hex">DEC→HEX</button>
                                    <button class="op-btn" data-op="bin-to-dec">BIN→DEC</button>
                                    <button class="op-btn" data-op="oct-to-dec">OCT→DEC</button>
                                    <button class="op-btn" data-op="hex-to-dec">HEX→DEC</button>
                                    <button class="op-btn" data-op="bin-to-oct">BIN→OCT</button>
                                    <button class="op-btn" data-op="bin-to-hex">BIN→HEX</button>
                                    <button class="op-btn" data-op="oct-to-bin">OCT→BIN</button>
                                    <button class="op-btn" data-op="hex-to-bin">HEX→BIN</button>
                                </div>

                                <!-- Suhu -->
                                <div class="ops-grid basis-grid" data-cat="suhu">
                                    <button class="op-btn" data-op="c-to-f">C→F</button>
                                    <button class="op-btn" data-op="c-to-k">C→K</button>
                                    <button class="op-btn" data-op="c-to-r">C→R</button>
                                    <button class="op-btn" data-op="f-to-c">F→C</button>
                                    <button class="op-btn" data-op="f-to-k">F→K</button>
                                    <button class="op-btn" data-op="f-to-r">F→R</button>
                                    <button class="op-btn" data-op="k-to-c">K→C</button>
                                    <button class="op-btn" data-op="k-to-f">K→F</button>
                                    <button class="op-btn" data-op="k-to-r">K→R</button>
                                    <button class="op-btn" data-op="r-to-c">R→C</button>
                                    <button class="op-btn" data-op="r-to-f">R→F</button>
                                    <button class="op-btn" data-op="r-to-k">R→K</button>
                                </div>

                                <!-- Kurs -->
                                <div class="ops-grid basis-grid" data-cat="kurs">
                                    <button class="op-btn" data-op="idr-to-usd">IDR→USD</button>
                                    <button class="op-btn" data-op="idr-to-eur">IDR→EUR</button>
                                    <button class="op-btn" data-op="idr-to-sgd">IDR→SGD</button>
                                    <button class="op-btn" data-op="idr-to-jpy">IDR→JPY</button>
                                    <button class="op-btn" data-op="idr-to-gbp">IDR→GBP</button>
                                    <button class="op-btn" data-op="idr-to-aud">IDR→AUD</button>
                                    <button class="op-btn" data-op="idr-to-cny">IDR→CNY</button>
                                    <button class="op-btn" data-op="idr-to-myr">IDR→MYR</button>
                                    <button class="op-btn" data-op="idr-to-krw">IDR→KRW</button>
                                    <button class="op-btn" data-op="idr-to-thb">IDR→THB</button>
                                </div>

                                <!-- Bonus -->
                                <div class="ops-grid" data-cat="bonus">
                                    <button class="op-btn wide" data-op="faktorial">FAKTORIAL (n!)</button>
                                    <button class="op-btn wide" data-op="fibonacci">FIBONACCI (F(n))</button>
                                </div>
                            </div>

                            <!-- Execute Button -->
                            <button id="btnHitung" class="hitung-btn">[ HITUNG ]</button>

                            <!-- Console Output -->
                            <div class="console-output">
                                <div class="console-header">> OUTPUT CONSOLE:</div>
                                <div id="consoleBody" class="console-body">
                                    <div class="console-line">> HASIL: 0</div>
                                    <div class="console-line blink">_</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="col-lg-5 col-md-12">
                <div class="app-window logs-window">
                    <div class="window-header">
                        <div class="window-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <span class="window-title">Logs.txt</span>
                    </div>
                    <div class="window-body">
                        <div class="logs-header">
                            <span># KalkulatorPRO v1.0.42</span>
                            <span id="sessionDate"># Session started: 2026-05-20</span>
                        </div>
                        <div id="logsBody" class="logs-body">
                            <div class="log-line">> _</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-cat="aritmatika">
            <span class="nav-icon">⊞</span>
            <span class="nav-label">Arit</span>
        </button>
        <button class="nav-btn" data-cat="logika">
            <span class="nav-icon">⚙</span>
            <span class="nav-label">Logic</span>
        </button>
        <button class="nav-btn" data-cat="basis">
            <span class="nav-icon">⇄</span>
            <span class="nav-label">Conv</span>
        </button>
        <button class="nav-btn" data-cat="bonus">
            <span class="nav-icon">★</span>
            <span class="nav-label">Plus</span>
        </button>
        <button class="nav-btn" id="btnClear">
            <span class="nav-icon">↺</span>
            <span class="nav-label">Clear</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>

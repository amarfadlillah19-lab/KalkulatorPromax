<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KalkulatorPromax</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="title-left">
            <span class="title-icon">◈</span>
            <span class="title-text">KalkulatorPromax</span>
        </div>
        <div class="menu-bar">
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Help</span>
        </div>
        <div class="title-right">
            <button id="themeToggle" class="window-btn" title="Toggle Dark/Light">◐</button>
            <button class="window-btn minimize">−</button>
            <button class="window-btn maximize">□</button>
            <button class="window-btn close">×</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="row g-3 h-100">
            <!-- Left Panel -->
            <div class="col-lg-7 col-md-12">
                <div class="app-window">
                    <div class="window-header">
                        <div class="window-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <span class="window-title" id="windowTitle">Arithmetic.exe</span>
                    </div>

                    <div class="window-body">
                        <!-- Tabs -->
                        <div class="tab-container">
                            <button class="tab-btn active" data-cat="aritmatika">Aritmatika</button>
                            <button class="tab-btn" data-cat="logika">Logika</button>
                            <button class="tab-btn" data-cat="basis">Basis</button>
                            <button class="tab-btn" data-cat="suhu">Suhu</button>
                            <button class="tab-btn" data-cat="kurs">Kurs</button>
                            <button class="tab-btn" data-cat="bonus">Bonus</button>
                        </div>

                        <!-- Content Area -->
                        <div class="content-area">
                            <!-- Inputs -->
                            <div class="input-section" id="inputSection">
                                <div class="row g-2" id="dualInput">
                                    <div class="col-6">
                                        <label class="input-label">Variable A:</label>
                                        <input type="text" id="inputA" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                    <div class="col-6">
                                        <label class="input-label">Variable B:</label>
                                        <input type="text" id="inputB" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                </div>
                                <div class="row g-2 d-none" id="singleInput">
                                    <div class="col-12">
                                        <label class="input-label">Input Value:</label>
                                        <input type="text" id="inputSingle" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                </div>
                            </div>

                            <!-- Operation Buttons -->
                            <div class="ops-section" id="opsSection">
                                <!-- Aritmatika -->
                                <div class="ops-grid active" data-cat="aritmatika">
                                    <button class="op-btn" data-op="+">+</button>
                                    <button class="op-btn" data-op="-">−</button>
                                    <button class="op-btn" data-op="*">×</button>
                                    <button class="op-btn" data-op="/">÷</button>
                                    <button class="op-btn" data-op="%">%</button>
                                    <button class="op-btn" data-op="^">^</button>
                                    <button class="op-btn" data-op="mod">mod</button>
                                    <button class="op-btn" data-op="floor">//</button>
                                    <button class="op-btn wide" data-op="sqrt">√ AKAR</button>
                                </div>

                                <!-- Logika -->
                                <div class="ops-grid" data-cat="logika">
                                    <button class="op-btn" data-op="AND">AND</button>
                                    <button class="op-btn" data-op="OR">OR</button>
                                    <button class="op-btn" data-op="XOR">XOR</button>
                                    <button class="op-btn" data-op="NOT">NOT</button>
                                    <button class="op-btn" data-op="NAND">NAND</button>
                                    <button class="op-btn" data-op="NOR">NOR</button>
                                </div>

                                <!-- Basis -->
                                <div class="ops-grid basis-grid" data-cat="basis">
                                    <button class="op-btn" data-op="dec-to-bin">DEC→BIN</button>
                                    <button class="op-btn" data-op="dec-to-oct">DEC→OCT</button>
                                    <button class="op-btn" data-op="dec-to-hex">DEC→HEX</button>
                                    <button class="op-btn" data-op="bin-to-dec">BIN→DEC</button>
                                    <button class="op-btn" data-op="oct-to-dec">OCT→DEC</button>

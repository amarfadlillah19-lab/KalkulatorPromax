<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KalkulatorPromax</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="title-left">
            <span class="title-icon">ŌŚł</span>
            <span class="title-text">KalkulatorPromax</span>
        </div>
        <div class="menu-bar">
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Help</span>
        </div>
        <div class="title-right">
            <button id="themeToggle" class="window-btn" title="Toggle Dark/Light">ŌŚÉ</button>
            <button class="window-btn minimize">ŌłÆ</button>
            <button class="window-btn maximize">Ō¢Ī</button>
            <button class="window-btn close">├Ś</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="row g-3 h-100">
            <!-- Left Panel -->
            <div class="col-lg-7 col-md-12">
                <div class="app-window">
                    <div class="window-header">
                        <div class="window-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <span class="window-title" id="windowTitle">Arithmetic.exe</span>
                    </div>

                    <div class="window-body">
                        <!-- Tabs -->
                        <div class="tab-container">
                            <button class="tab-btn active" data-cat="aritmatika">Aritmatika</button>
                            <button class="tab-btn" data-cat="logika">Logika</button>
                            <button class="tab-btn" data-cat="basis">Basis</button>
                            <button class="tab-btn" data-cat="suhu">Suhu</button>
                            <button class="tab-btn" data-cat="kurs">Kurs</button>
                            <button class="tab-btn" data-cat="bonus">Bonus</button>
                        </div>

                        <!-- Content Area -->
                        <div class="content-area">
                            <!-- Inputs -->
                            <div class="input-section" id="inputSection">
                                <div class="row g-2" id="dualInput">
                                    <div class="col-6">
                                        <label class="input-label">Variable A:</label>
                                        <input type="text" id="inputA" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                    <div class="col-6">
                                        <label class="input-label">Variable B:</label>
                                        <input type="text" id="inputB" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                </div>
                                <div class="row g-2 d-none" id="singleInput">
                                    <div class="col-12">
                                        <label class="input-label">Input Value:</label>
                                        <input type="text" id="inputSingle" class="retro-input" placeholder="0" autocomplete="off">
                                    </div>
                                </div>
                            </div>

                            <!-- Operation Buttons -->
                            <div class="ops-section" id="opsSection">
                                <!-- Aritmatika -->
                                <div class="ops-grid active" data-cat="aritmatika">
                                    <button class="op-btn" data-op="+">+</button>
                                    <button class="op-btn" data-op="-">ŌłÆ</button>
                                    <button class="op-btn" data-op="*">├Ś</button>
                                    <button class="op-btn" data-op="/">├Ę</button>
                                    <button class="op-btn" data-op="%">%</button>
                                    <button class="op-btn" data-op="^">^</button>
                                    <button class="op-btn" data-op="mod">mod</button>
                                    <button class="op-btn" data-op="floor">//</button>
                                    <button class="op-btn wide" data-op="sqrt">ŌłÜ AKAR</button>
                                </div>

                                <!-- Logika -->
                                <div class="ops-grid" data-cat="logika">
                                    <button class="op-btn" data-op="AND">AND</button>
                                    <button class="op-btn" data-op="OR">OR</button>
                                    <button class="op-btn" data-op="XOR">XOR</button>
                                    <button class="op-btn" data-op="NOT">NOT</button>
                                    <button class="op-btn" data-op="NAND">NAND</button>
                                    <button class="op-btn" data-op="NOR">NOR</button>
                                </div>

                                <!-- Basis -->
                                <div class="ops-grid basis-grid" data-cat="basis">
                                    <button class="op-btn" data-op="dec-to-bin">DECŌåÆBIN</button>
                                    <button class="op-btn" data-op="dec-to-oct">DECŌåÆOCT</button>
                                    <button class="op-btn" data-op="dec-to-hex">DECŌåÆHEX</button>
                                    <button class="op-btn" data-op="bin-to-dec">BINŌåÆDEC</button>
                                    <button class="op-btn" data-op="oct-to-dec">OCTŌåÆDEC</button>
                                    <button class="op-btn" data-op="hex-to-dec">HEXŌåÆDEC</button>
                                    <button class="op-btn" data-op="bin-to-oct">BINŌåÆOCT</button>
                                    <button class="op-btn" data-op="bin-to-hex">BINŌåÆHEX</button>
                                    <button class="op-btn" data-op="oct-to-bin">OCTŌåÆBIN</button>
                                    <button class="op-btn" data-op="hex-to-bin">HEXŌåÆBIN</button>
                                </div>

                                <!-- Suhu -->
                                <div class="ops-grid basis-grid" data-cat="suhu">
                                    <button class="op-btn" data-op="c-to-f">CŌåÆF</button>
                                    <button class="op-btn" data-op="c-to-k">CŌåÆK</button>
                                    <button class="op-btn" data-op="c-to-r">CŌåÆR</button>
                                    <button class="op-btn" data-op="f-to-c">FŌåÆC</button>
                                    <button class="op-btn" data-op="f-to-k">FŌåÆK</button>
                                    <button class="op-btn" data-op="f-to-r">FŌåÆR</button>
                                    <button class="op-btn" data-op="k-to-c">KŌåÆC</button>
                                    <button class="op-btn" data-op="k-to-f">KŌåÆF</button>
                                    <button class="op-btn" data-op="k-to-r">KŌåÆR</button>
                                    <button class="op-btn" data-op="r-to-c">RŌåÆC</button>
                                    <button class="op-btn" data-op="r-to-f">RŌåÆF</button>
                                    <button class="op-btn" data-op="r-to-k">RŌåÆK</button>
                                </div>

                                <!-- Kurs -->
                                <div class="ops-grid basis-grid" data-cat="kurs">
                                    <button class="op-btn" data-op="idr-to-usd">IDRŌåÆUSD</button>
                                    <button class="op-btn" data-op="idr-to-eur">IDRŌåÆEUR</button>
                                    <button class="op-btn" data-op="idr-to-sgd">IDRŌåÆSGD</button>
                                    <button class="op-btn" data-op="idr-to-jpy">IDRŌåÆJPY</button>
                                    <button class="op-btn" data-op="idr-to-gbp">IDRŌåÆGBP</button>
                                    <button class="op-btn" data-op="idr-to-aud">IDRŌåÆAUD</button>
                                    <button class="op-btn" data-op="idr-to-cny">IDRŌåÆCNY</button>
                                    <button class="op-btn" data-op="idr-to-myr">IDRŌåÆMYR</button>
                                    <button class="op-btn" data-op="idr-to-krw">IDRŌåÆKRW</button>
                                    <button class="op-btn" data-op="idr-to-thb">IDRŌåÆTHB</button>
                                </div>

                                <!-- Bonus -->
                                <div class="ops-grid" data-cat="bonus">
                                    <button class="op-btn wide" data-op="faktorial">FAKTORIAL (n!)</button>
                                    <button class="op-btn wide" data-op="fibonacci">FIBONACCI (F(n))</button>
                                </div>
                            </div>

                            <!-- Execute Button -->
                            <button id="btnHitung" class="hitung-btn">[ HITUNG ]</button>

                            <!-- Console Output -->
                            <div class="console-output">
                                <div class="console-header">> OUTPUT CONSOLE:</div>
                                <div id="consoleBody" class="console-body">
                                    <div class="console-line">> HASIL: 0</div>
                                    <div class="console-line blink">_</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="col-lg-5 col-md-12">
                <div class="app-window logs-window">
                    <div class="window-header">
                        <div class="window-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
